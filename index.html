<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome to Javascript</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.png">
</head>
<body>

<div class="typewriter">
    <h1>Welcome to JavaScript</h1>
</div>

<div class="wrapper">
    <button>Say hello</button>
    <button class="bye" id="btn">Say bye</button>
    <button id="enter-name">Enter name</button>

    <hr>

    <label for="number1">Enter first number</label>
    <input type="number" class="number1" name="number1" id="number1" placeholder="First number">

    <label for="number2">Enter second number</label>
    <input type="number" class="number2" name="number2" id="number2" placeholder="Second number">

    <button class="add">+</button>
    <button class="subtract">-</button>
    <button class="multiply">*</button>
    <button class="divide">/</button>
</div>


<script src="script.js"></script>
</body>
</html>
